<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Serigne Fallou Ndiaye</title>
  <style>
    body {
      font-family: Segoe UI, Tahoma, sans-serif;
      margin: 0;
      background: linear-gradient(-45deg, #0a0a0a, #111, #222, #0a0a0a);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Navbar */
    nav {
      background-color: rgba(0,0,0,0.7);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    nav .logo {
      color: #00ff88;
      font-size: 22px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      text-decoration: none;
      color: #ccc;
      font-size: 18px;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #00ff88;
    }

    /* Hero Section */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      color: #00ff88;
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      color: #ccc;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .hero button {
      background-color: #00ff88;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.2s;
    }

    .hero button:hover {
      background-color: #00cc66;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Serigne Fallou Ndiaye</div>
    <ul>
      <li><a href="#">Accueil</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Salut, je suis Serigne Fallou Ndiaye</h1>
    <p>Étudiant MIC en 3ème année. Je code et je crée.</p>
    <p>Mon égo est en mode solo leveling (évolution solo).</p>
    <button>Voir mes projets</button>
  </section>

  <!-- Script GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    gsap.from(".hero h1", {
      duration: 1.5,
      y: -50,
      opacity: 0,
      ease: "bounce.out"
    });

    gsap.from(".hero p", {
      duration: 1,
      x: -50,
      opacity: 0,
      stagger: 0.3
    });

    gsap.from(".hero button", {
      duration: 1,
      scale: 0,
      opacity: 0,
      ease: "elastic.out(1, 0.5)"
    });
  </script>
</body>
</html>
